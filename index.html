<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDUSTRIAL ENGINE v4.8 | Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700;800&display=swap');

        :root {
            --safety-orange: #ff6b00;
            --deep-black: #0d0e10;
            --panel-bg: #15171a;
            --border-color: rgba(255, 107, 0, 0.4);
            --neon-glow: 0 0 25px rgba(255, 107, 0, 0.15);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--deep-black);
            color: #e2e8f0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(255, 107, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 0, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }
        .scanline::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,107,0,0.01) 50%, transparent);
            animation: scanline 12s linear infinite; pointer-events: none;
        }

        .industrial-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .industrial-card:hover {
            border-color: var(--safety-orange);
            box-shadow: var(--neon-glow);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--safety-orange);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 30px rgba(255, 107, 0, 0.5); }

        .progress-track { background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-bar { background: var(--safety-orange); height: 100%; transition: width 1.5s ease; box-shadow: 0 0 10px var(--safety-orange); }

        input, textarea, select {
            background: rgba(0,0,0,0.4) !important;
            border: 1px solid rgba(255,255,255,0.05) !important;
            color: white !important;
            transition: all 0.2s ease !important;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--safety-orange) !important;
            outline: none !important;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.1) !important;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--safety-orange); }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="min-h-screen scanline pb-20">

    <!-- MODALNI OKNO -->
    <div id="modal-container" class="fixed inset-0 z-[95] bg-black/98 backdrop-blur-xl hidden flex items-center justify-center p-6 no-print">
        <div class="industrial-card p-12 rounded-[40px] max-w-lg w-full border-2 border-orange-500/50 shadow-2xl">
            <h3 id="modal-title" class="text-3xl font-black text-white mb-4 uppercase italic tracking-widest text-center">Systémový Audit</h3>
            <p id="modal-text" class="text-gray-400 mb-10 leading-relaxed text-center font-medium"></p>
            <div class="flex gap-5">
                <button id="modal-confirm" class="flex-1 btn-primary p-5 rounded-2xl text-sm tracking-[3px]">Smazat</button>
                <button id="modal-cancel" class="flex-1 bg-white/5 hover:bg-white/10 p-5 rounded-2xl text-sm font-bold transition uppercase tracking-widest text-gray-500">Zrušit</button>
            </div>
        </div>
    </div>

    <!-- NOTIFIKACE -->
    <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 no-print"></div>

    <!-- NAVIGACE -->
    <nav class="border-b border-white/5 bg-[#0d0f11]/90 backdrop-blur-3xl p-6 sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-6">
                <div class="w-14 h-14 bg-orange-600 rounded-2xl flex items-center justify-center font-black text-black text-3xl shadow-[0_0_20px_#ff6b00]">T</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase leading-none italic">Industrial Workshop <span class="text-orange-500 text-sm">v4.8</span></h1>
                    <div class="flex items-center gap-2 mt-2 text-[10px] text-gray-500 mono font-bold uppercase tracking-[3px]">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                        Workshop Registry 
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-6 bg-black/60 p-2 rounded-2xl border border-white/5 shadow-2xl">
                <div class="px-6 border-r border-white/10">
                    <span class="text-[10px] font-black text-gray-600 uppercase block mb-1 tracking-widest">Práva:</span>
                    <select id="roleSelector" class="bg-transparent text-sm font-black text-orange-500 outline-none cursor-pointer uppercase tracking-[2px]">
                        <option value="user">UŽIVATEL</option>
                        <option value="admin">ADMINISTRÁTOR</option>
                    </select>
                </div>
                <div class="flex gap-2 pr-2">
                    <button onclick="Engine.export()" class="p-3 hover:bg-white/10 rounded-xl transition" title="Export dat">💾</button>
                    <button onclick="window.print()" class="p-3 hover:bg-white/10 rounded-xl transition" title="Tisk">🖨️</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-12">
        
        <!-- DASHBOARD HUD -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 mb-16 no-print">
            <div class="industrial-card p-8 rounded-3xl relative overflow-hidden group">
                <p class="text-[10px] text-gray-600 uppercase font-black mb-2 tracking-[3px]">Celkem</p>
                <p id="stat-total" class="text-5xl font-black mono text-white">0</p>
            </div>
            <div class="industrial-card p-8 rounded-3xl border-l-8 border-l-orange-500">
                <p class="text-[10px] text-gray-500 uppercase font-black mb-2 tracking-[3px]">Výroba</p>
                <p id="stat-pending" class="text-5xl font-black mono text-orange-500">0</p>
            </div>
            <div class="industrial-card p-8 rounded-3xl border-l-8 border-l-green-500">
                <p class="text-[10px] text-gray-600 uppercase font-black mb-2 tracking-[3px]">Hotovo</p>
                <p id="stat-done" class="text-5xl font-black mono text-green-500">0</p>
            </div>
            <div class="industrial-card p-8 rounded-3xl bg-orange-600/5">
                <p class="text-[10px] text-orange-500 uppercase font-black mb-2 tracking-[3px]">Pokladna (Kč)</p>
                <div class="flex items-baseline gap-3">
                    <p id="stat-money" class="text-4xl font-black mono text-white">0</p>
                    <span class="text-xs text-gray-600 font-bold uppercase tracking-widest">CZK</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <!-- ADMIN FORM (LEVY SLOUPEC) -->
            <div id="admin-panel" class="lg:col-span-5 hidden no-print">
                <div class="industrial-card p-10 rounded-[40px] sticky top-36 shadow-2xl border-orange-500/30">
                    <h2 class="text-2xl font-black uppercase italic mb-10 flex items-center gap-4">
                        <span class="w-1.5 h-8 bg-orange-500 rounded-full animate-ping"></span>
                        Zápis Zakázky
                    </h2>
                    
                    <form id="orderForm" class="space-y-6">
                        <!-- ZÁKLAD -->
                        <div class="space-y-4">
                            <label class="text-[11px] font-black text-gray-500 uppercase ml-1 tracking-widest italic">Zákazník & Co</label>
                            <input type="text" id="zakaznik" placeholder="Zákazník" class="w-full p-4 rounded-2xl text-sm" required>
                            <input type="text" id="produkt" placeholder="Název výrobku" class="w-full p-4 rounded-2xl text-sm mt-3" required>
                        </div>

                        <!-- MATROŠ -->
                        <div class="space-y-4">
                            <label class="text-[11px] font-black text-gray-500 uppercase ml-1 tracking-widest italic">Materiálový List</label>
                            <input type="text" id="material_typ" placeholder="Materiál (Dub, Buk, Lamino...)" class="w-full p-4 rounded-2xl text-sm" required>
                            <textarea id="material_extra" rows="2" placeholder="Doplňky a poznámky..." class="w-full p-4 rounded-2xl text-sm resize-none"></textarea>
                        </div>

                        <!-- LOKALITA (MÍSTO MAPY) -->
                        <div class="space-y-4 bg-black/40 p-6 rounded-[32px] border border-white/5 shadow-inner">
                            <label class="text-[11px] font-black text-orange-500 uppercase ml-1 tracking-[4px] italic">Lokalita Montáže</label>
                            <div class="grid grid-cols-1 gap-3">
                                <select id="kraj" class="w-full p-4 rounded-2xl text-sm" required>
                                    <option value="" disabled selected>Vyberte kraj</option>
                                    <option value="Praha">Praha</option>
                                    <option value="Středočeský">Středočeský</option>
                                    <option value="Jihočeský">Jihočeský</option>
                                    <option value="Plzeňský">Plzeňský</option>
                                    <option value="Karlovarský">Karlovarský</option>
                                    <option value="Ústecký">Ústecký</option>
                                    <option value="Liberecký">Liberecký</option>
                                    <option value="Královéhradecký">Královéhradecký</option>
                                    <option value="Pardubický">Pardubický</option>
                                    <option value="Vysočina">Vysočina</option>
                                    <option value="Jihomoravský">Jihomoravský</option>
                                    <option value="Olomoucký">Olomoucký</option>
                                    <option value="Moravskoslezský">Moravskoslezský</option>
                                    <option value="Zlínský">Zlínský</option>
                                </select>
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="text" id="mesto" placeholder="Město" class="p-4 rounded-2xl text-sm" required>
                                    <input type="text" id="psc" placeholder="PSČ" class="p-4 rounded-2xl text-sm" required>
                                </div>
                                <input type="text" id="adresa" placeholder="Ulice a č.p." class="w-full p-4 rounded-2xl text-sm" required>
                            </div>
                        </div>

                        <!-- OSTATNÍ -->
                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] text-gray-600 font-black uppercase ml-1 tracking-widest">Expedice do</label>
                                <input type="date" id="termin" class="w-full p-4 rounded-2xl text-xs" required>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] text-gray-600 font-black uppercase ml-1 tracking-widest">Kalkulace (Kč)</label>
                                <input type="number" id="cena" placeholder="0" class="w-full p-4 rounded-2xl text-xs font-mono text-orange-500 font-black" required>
                            </div>
                        </div>

                        <button type="submit" class="w-full btn-primary p-6 rounded-3xl text-xs tracking-[8px] mt-4 active:scale-95 transition-all shadow-lg">
                            Uložit do Registru
                        </button>
                    </form>
                </div>
            </div>

            <!-- LISTING (PRAVY SLOUPEC) -->
            <div id="list-panel" class="lg:col-span-12 space-y-12 transition-all duration-700">
                <div class="flex flex-col sm:flex-row justify-between items-end sm:items-center no-print px-4 gap-6">
                    <div class="space-y-2">
                        <h2 class="text-4xl font-black uppercase italic tracking-tighter flex items-center gap-6">
                            <span class="w-2 h-12 bg-orange-500 rounded-full shadow-[0_0_20px_#ff6b00]"></span>
                            Produkční Proces
                            <span id="active-count" class="text-lg bg-white/5 px-6 py-2 rounded-full text-gray-600 font-black mono tracking-[5px]">0</span>
                        </h2>
                        <p class="text-[11px] text-gray-700 font-black uppercase tracking-[8px] ml-4 italic">Live Database Stream // v4.8 Address PRO</p>
                    </div>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-700 text-xs italic font-black uppercase tracking-widest">Hledat_</span>
                        <input type="text" id="searchInput" oninput="Engine.render()" placeholder="..." class="bg-[#16181a] border border-white/5 p-4 pl-24 rounded-2xl text-xs w-72 focus:border-orange-500 outline-none transition-all shadow-2xl">
                    </div>
                </div>
                
                <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-12 pb-32">
                    <!-- Karty generuje JS -->
                </div>
                
                <div id="empty-state" class="hidden text-center py-80 border-2 border-dashed border-white/5 rounded-[80px] text-gray-900 font-black uppercase text-[12px] tracking-[25px] opacity-10">
                    Systém Prázdný
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * INDUSTRIAL ENGINE CORE v4.8
         * Full CRUD persistence with localized address data
         */

        const STAGES = ['FRONTA', 'PŘÍPRAVA', 'VÝROBA', 'LAKOVÁNÍ', 'MONTÁŽ', 'EXPEDICE'];

        const Engine = {
            dbKey: 'ind_engine_v4_8_rekte_final',

            init() {
                roleSelector.addEventListener('change', () => this.updateRole());
                orderForm.addEventListener('submit', (e) => this.handleForm(e));
                this.updateRole();
                this.render();
                this.toast("ENGINE v4.8 ONLINE // VÍTEJTE ");
            },

            updateRole() {
                const isAdmin = roleSelector.value === 'admin';
                adminPanel.classList.toggle('hidden', !isAdmin);
                listPanel.className = isAdmin ? 'lg:col-span-7 transition-all duration-700' : 'lg:col-span-12 transition-all duration-700';
                this.render();
            },

            handleForm(e) {
                e.preventDefault();
                const orders = this.getOrders();
                const newOrder = {
                    id: Date.now().toString(),
                    zakaznik: document.getElementById('zakaznik').value,
                    produkt: document.getElementById('produkt').value,
                    mat_typ: document.getElementById('material_typ').value,
                    mat_extra: document.getElementById('material_extra').value || "-",
                    kraj: document.getElementById('kraj').value,
                    mesto: document.getElementById('mesto').value,
                    psc: document.getElementById('psc').value,
                    adresa: document.getElementById('adresa').value,
                    termin: document.getElementById('termin').value,
                    cena: Number(document.getElementById('cena').value),
                    stav: 'FRONTA',
                    created: new Date().toISOString()
                };

                orders.push(newOrder);
                this.saveOrders(orders);
                e.target.reset();
                this.toast("ZAKÁZKA ULOŽENA DO REGISTRU");
            },

            render() {
                this.updateStats();
                const container = document.getElementById('ordersGrid');
                const query = searchInput.value.toLowerCase();
                const isAdmin = roleSelector.value === 'admin';

                let data = this.getOrders().filter(o => 
                    o.zakaznik.toLowerCase().includes(query) || 
                    o.produkt.toLowerCase().includes(query) ||
                    o.mesto.toLowerCase().includes(query)
                );

                document.getElementById('empty-state').classList.toggle('hidden', data.length > 0);
                document.getElementById('active-count').innerText = data.length;

                container.innerHTML = '';
                data.sort((a,b) => b.id - a.id).forEach((o, index) => {
                    const card = document.createElement('div');
                    const progress = ((STAGES.indexOf(o.stav) + 1) / STAGES.length) * 100;
                    const isExpedice = o.stav === 'EXPEDICE';
                    
                    card.className = `industrial-card p-10 rounded-[64px] flex flex-col justify-between ${isExpedice ? 'opacity-30 grayscale-[0.8]' : ''}`;
                    card.style.animation = `slideUp 0.5s ease-out forwards ${index * 0.05}s`;
                    card.style.opacity = '0';
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-8">
                                <span class="mono text-[10px] text-gray-700 font-bold uppercase tracking-[4px]">LOG_REF_${o.id.slice(-4)}</span>
                                <div class="flex flex-col items-end gap-2">
                                    <span class="px-4 py-1.5 rounded text-[10px] font-black uppercase shadow-inner ${this.getStatusStyle(o.stav)}">${o.stav}</span>
                                    <span class="text-[9px] text-gray-500 font-black uppercase tracking-[2px] italic">Sektor: ${o.kraj}</span>
                                </div>
                            </div>

                            <h3 class="text-3xl font-black text-white uppercase italic leading-none mb-2 tracking-tight group-hover:text-orange-500 transition-colors">${o.produkt}</h3>
                            <p class="text-[12px] text-orange-500 font-black uppercase mb-10 tracking-widest">${o.zakaznik}</p>
                            
                            <div class="bg-black/30 p-8 rounded-[40px] border border-white/5 space-y-6 mb-10 shadow-inner relative overflow-hidden">
                                <!-- MATROŠ -->
                                <div class="space-y-2">
                                    <span class="text-[10px] font-black text-gray-700 uppercase tracking-widest">Matroš List:</span>
                                    <p class="text-[13px] text-white font-black leading-snug underline decoration-orange-500/30 underline-offset-4">${o.mat_typ}</p>
                                    <p class="text-[11px] text-gray-500 italic leading-relaxed line-clamp-2 opacity-80">${o.mat_extra}</p>
                                </div>

                                <!-- ADRESA -->
                                <div class="pt-4 border-t border-white/5 space-y-2">
                                    <span class="text-[10px] font-black text-gray-700 uppercase tracking-widest">Lokalita Montáže:</span>
                                    <p class="text-[11px] text-white font-bold">${o.adresa}</p>
                                    <p class="text-[11px] text-white/80">${o.psc} ${o.mesto}</p>
                                </div>

                                <!-- PROGRESS -->
                                <div class="space-y-4 pt-4 border-t border-white/5">
                                    <div class="flex justify-between text-[11px] items-center">
                                        <span class="text-gray-700 font-black uppercase text-[10px] tracking-widest italic">Workflow Status:</span>
                                        <span class="text-orange-500 mono text-[12px] font-black italic">${Math.round(progress)}%</span>
                                    </div>
                                    <div class="progress-track"><div class="progress-bar" style="width: ${progress}%"></div></div>
                                </div>

                                <div class="flex justify-between text-[11px] pt-2">
                                    <span class="text-gray-700 font-black uppercase text-[10px] tracking-widest">Deadline:</span>
                                    <span class="text-white mono font-black tracking-tighter italic text-sm">${new Date(o.termin).toLocaleDateString('cs-CZ')}</span>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="flex justify-between items-baseline border-b border-white/10 pb-4 px-2">
                                <span class="text-[11px] font-black text-gray-800 uppercase tracking-[4px]">Kalkulace</span>
                                <div class="flex items-baseline gap-2 text-white font-black">
                                    <span class="text-2xl mono tracking-tighter">${o.cena.toLocaleString()}</span>
                                    <span class="text-[10px] text-gray-700 font-bold uppercase tracking-widest">CZK</span>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="Engine.nextStep('${o.id}')" class="flex-1 bg-white/5 hover:bg-orange-500 hover:text-black py-5 rounded-[24px] text-[11px] font-black uppercase transition-all tracking-[6px] shadow-2xl">Změnit Fázi</button>
                                ${isAdmin ? `<button onclick="Engine.deletePrompt('${o.id}')" class="w-14 h-14 flex items-center justify-center bg-red-900/10 text-red-600 border border-red-900/20 rounded-[24px] hover:bg-red-600 hover:text-white transition-all text-sm">🗑️</button>` : ''}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            },

            nextStep(id) {
                const orders = this.getOrders();
                const o = orders.find(x => String(x.id) === String(id));
                let idx = STAGES.indexOf(o.stav);
                o.stav = STAGES[(idx + 1) % STAGES.length];
                this.saveOrders(orders);
                this.toast(`SYSTÉM: #${o.id.slice(-4)} -> ${o.stav}`);
            },

            deletePrompt(id) {
                const modal = document.getElementById('modal-container');
                const order = this.getOrders().find(x => String(x.id) === String(id));
                document.getElementById('modal-text').innerText = `Chystáte se zlikvidovat projekt "${order.produkt}" (Klient: ${order.zakaznik}). Tato operace je nevratná!`;
                modal.classList.remove('hidden');
                document.getElementById('modal-confirm').onclick = () => {
                    this.deleteOrder(id);
                    modal.classList.add('hidden');
                };
                document.getElementById('modal-cancel').onclick = () => modal.classList.add('hidden');
            },

            deleteOrder(id) {
                let orders = this.getOrders();
                orders = orders.filter(o => String(o.id) !== String(id));
                this.saveOrders(orders);
                this.toast("ZÁZNAM VYMAZÁN", "error");
            },

            updateStats() {
                const orders = this.getOrders();
                statTotal.innerText = orders.length;
                statPending.innerText = orders.filter(o => o.stav !== 'EXPEDICE').length;
                statDone.innerText = orders.filter(o => o.stav === 'EXPEDICE').length;
                statMoney.innerText = orders.reduce((s, o) => s + o.cena, 0).toLocaleString();
            },

            getOrders: () => JSON.parse(localStorage.getItem(Engine.dbKey)) || [],
            saveOrders: (o) => { localStorage.setItem(Engine.dbKey, JSON.stringify(o)); Engine.render(); },

            getStatusStyle: (s) => {
                const styles = { 
                    'FRONTA': 'text-gray-500 bg-gray-500/10 border border-gray-500/20', 
                    'PŘÍPRAVA': 'text-blue-400 bg-blue-400/10 border border-blue-400/20', 
                    'VÝROBA': 'text-orange-500 bg-orange-500/10 border border-orange-500/20', 
                    'LAKOVÁNÍ': 'text-purple-400 bg-purple-400/10 border border-purple-400/20', 
                    'MONTÁŽ': 'text-yellow-400 bg-yellow-400/10 border border-yellow-400/20', 
                    'EXPEDICE': 'text-green-500 bg-green-500/10 border border-green-500/20' 
                };
                return styles[s] || '';
            },

            toast(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = `industrial-card px-10 py-6 rounded-[32px] border-l-8 ${type === 'error' ? 'border-red-600 bg-red-600/5' : 'border-orange-600 bg-orange-600/5'} shadow-2xl`;
                t.innerHTML = `<p class="text-[12px] font-black uppercase tracking-widest text-white italic">${msg}</p>`;
                container.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-15px)'; setTimeout(() => t.remove(), 400); }, 3500);
            },

            export() {
                const data = this.getOrders();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `REKTE_V4_8_DB_DUMP.json`;
